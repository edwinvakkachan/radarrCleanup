version: "3.8"

services:
  radarr-cleaner:
    build: .
    container_name: radarrcleaner
    restart: no
    environment:
      API: ${API}
      IP: ${IP}
      DATABASE_URL: ${DATABASE_URL}
      QBIT_TIME: ${QBIT_TIME}
      QBITIP: ${QBITIP}
      QBITUSER: ${QBITUSER}
      QBITPASS: ${QBITPASS}
      HOMEASSISTANTWEBHOOK: ${HOMEASSISTANTWEBHOOK}







